<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STK Weekend Mobility Car</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --blue:#1a5fb4;--blue-dark:#0d3b7a;--blue-light:#e8f0fb;
  --green:#2e7d32;--green-light:#e8f5e9;
  --red:#c62828;--red-light:#ffebee;
  --orange:#e65100;--orange-light:#fff3e0;
  --gray:#f5f5f5;--gray2:#e0e0e0;--gray3:#9e9e9e;
  --text:#212121;--text2:#616161;
  --radius:8px;--shadow:0 2px 8px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f4f8;color:var(--text);font-size:14px}
/* ── HEADER ── */
.header{background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header-left{display:flex;align-items:center;gap:12px}
.header-icon{font-size:1.4rem}
.header-title{font-size:1rem;font-weight:700}
.header-sub{font-size:.72rem;opacity:.75;margin-top:1px}
.header-right{display:flex;align-items:center;gap:12px;font-size:.8rem}
.btn-logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:.78rem}
.btn-logout:hover{background:rgba(255,255,255,.25)}
/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0d3b7a,#1a5fb4)}
.login-card{background:#fff;border-radius:16px;padding:48px 40px;text-align:center;width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-logo{font-size:3rem;margin-bottom:16px}
.login-title{font-size:1.3rem;font-weight:700;margin-bottom:6px}
.login-sub{font-size:.82rem;color:var(--text2);margin-bottom:32px}
.btn-ms-login{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-ms-login:hover{background:var(--blue-dark)}
.btn-ms-login:disabled{background:var(--gray3);cursor:not-allowed}
/* ── TABS ── */
.tab-bar{background:#fff;border-bottom:2px solid var(--gray2);padding:0 24px;display:flex;gap:4px}
.tab-btn{padding:12px 20px;border:none;background:none;cursor:pointer;font-size:.85rem;font-weight:500;color:var(--text2);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.tab-btn:hover{color:var(--blue)}
/* ── MAIN ── */
#app{display:none}
.page{display:none;padding:24px;max-width:1100px;margin:0 auto}
.page.active{display:block}
/* ── CARDS ── */
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid var(--gray2);display:flex;align-items:center;justify-content:space-between}
.card-title{font-weight:700;font-size:.95rem}
.card-body{padding:18px}
/* ── EVENT LIST ── */
.event-grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(340px,1fr))}
.event-card{background:#fff;border-radius:10px;box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;border:2px solid transparent}
.event-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.15)}
.event-card.active-event{border-color:var(--blue)}
.event-card.faded{opacity:.45;filter:grayscale(30%)}
.event-card.faded:hover{opacity:.6;transform:none}
.event-card-header{padding:14px 16px;background:linear-gradient(135deg,var(--blue),#2e86de)}
.event-card-header.finished{background:linear-gradient(135deg,#757575,#9e9e9e)}
.event-card-header.deadline-passed{background:linear-gradient(135deg,#546e7a,#78909c)}
.event-card-header.drawn{background:linear-gradient(135deg,#5e7a54,#7c9e6e)}
.event-card-title{color:#fff;font-weight:700;font-size:.95rem}
.event-card-week{color:rgba(255,255,255,.8);font-size:.75rem;margin-top:3px}
.event-card-body{padding:14px 16px}
.event-info-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:.82rem;color:var(--text2)}
.event-info-row strong{color:var(--text)}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700}
.status-badge.active{background:var(--blue-light);color:var(--blue)}
.status-badge.finished{background:var(--gray);color:var(--gray3)}
.status-badge.draft{background:var(--orange-light);color:var(--orange)}
.status-badge.deadline-passed{background:#eceff1;color:#546e7a}
.status-badge.drawn{background:#e8f5e9;color:#388e3c}
/* ── DETAIL ── */
.detail-header{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px;margin-bottom:16px}
.detail-title{font-size:1.15rem;font-weight:700;margin-bottom:12px}
.detail-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-meta-item{background:var(--gray);border-radius:6px;padding:10px 14px}
.detail-meta-label{font-size:.72rem;color:var(--text2);margin-bottom:3px}
.detail-meta-value{font-size:.88rem;font-weight:600}
.vehicle-table{width:100%;border-collapse:collapse}
.vehicle-table th{background:var(--blue);color:#fff;padding:10px 12px;text-align:left;font-size:.82rem}
.vehicle-table td{padding:10px 12px;border-bottom:1px solid var(--gray2);font-size:.85rem}
.vehicle-table tr:last-child td{border-bottom:none}
.vehicle-table tr:hover td{background:var(--blue-light)}
.app-status{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700}
.app-status.applied{background:#e3f2fd;color:#1565c0}
.app-status.winner{background:var(--green-light);color:var(--green)}
.app-status.not-selected{background:var(--gray);color:var(--gray3)}
.app-status.waiting{background:var(--orange-light);color:var(--orange)}
.btn-apply{background:var(--blue);color:#fff;border:none;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:.8rem;font-weight:600}
.btn-apply:hover{background:var(--blue-dark)}
.btn-apply:disabled{background:var(--gray3);cursor:not-allowed}
.btn-cancel{background:var(--red-light);color:var(--red);border:1px solid var(--red);padding:6px 16px;border-radius:4px;cursor:pointer;font-size:.8rem;font-weight:600}
.notice-box{border:1px solid var(--gray2);border-radius:6px;padding:14px 16px;font-size:.85rem;white-space:pre-wrap;background:#fffde7}
/* ── ADMIN ── */
.admin-section{margin-bottom:24px}
.admin-section-title{font-size:.9rem;font-weight:700;color:var(--blue);margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--blue-light)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:.78rem;font-weight:600;color:var(--text2)}
.form-group input,.form-group select,.form-group textarea{border:1px solid var(--gray2);border-radius:4px;padding:7px 10px;font-size:.85rem;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--blue)}
.btn{padding:8px 16px;border-radius:4px;border:none;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-dark)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:#1b5e20}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#b71c1c}
.btn-warning{background:var(--orange);color:#fff}
.btn-warning:hover{background:#bf360c}
.btn-secondary{background:var(--gray2);color:var(--text)}
.btn-secondary:hover{background:#bdbdbd}
.btn-sm{padding:4px 10px;font-size:.75rem}
.vehicle-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;background:var(--gray);padding:8px;border-radius:4px}
.vehicle-row input{flex:1;min-width:0}
.admin-event-list{display:flex;flex-direction:column;gap:10px}
.admin-event-item{background:#fff;border-radius:6px;border:1px solid var(--gray2);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.admin-event-item.pinned{border-color:var(--blue);background:#f0f7ff}
.adm-section-label{font-size:.73rem;font-weight:700;color:var(--text2);letter-spacing:.04em;padding:6px 2px 4px;text-transform:uppercase}
.adm-divider{border:none;border-top:1px dashed var(--gray2);margin:6px 0 10px}
.admin-event-info{flex:1}
.admin-event-title{font-weight:700;font-size:.88rem}
.admin-event-meta{font-size:.75rem;color:var(--text2);margin-top:3px}
.admin-event-actions{display:flex;gap:6px}
/* ── COUPON ── */
.coupon-display{background:linear-gradient(135deg,var(--blue),#2e86de);color:#fff;border-radius:10px;padding:16px 20px;display:flex;align-items:center;gap:16px;margin-bottom:16px}
.coupon-icon{font-size:2rem}
.coupon-count{font-size:1.8rem;font-weight:700}
.coupon-label{font-size:.8rem;opacity:.85}
/* ── LOADING ── */
#loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:9999}
.loading-box{background:#fff;border-radius:10px;padding:28px 40px;text-align:center}
.spinner{width:36px;height:36px;border:4px solid var(--gray2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:10px;padding:24px;width:90%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
/* ── EMPTY ── */
.empty-state{text-align:center;padding:48px 24px;color:var(--gray3)}
.empty-icon{font-size:3rem;margin-bottom:12px}
/* ── PAGINATION ── */
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:16px}
.page-btn{padding:6px 10px;border:1px solid var(--gray2);background:#fff;border-radius:4px;cursor:pointer;font-size:.8rem}
.page-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.page-btn:hover:not(.active){background:var(--blue-light)}
/* ── RESPONSIVE ── */
@media(max-width:600px){
  .event-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .detail-meta-grid{grid-template-columns:1fr}
  .header-sub{display:none}
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/themes/material_blue.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/l10n/ko.min.js"></script>
<style>
.flatpickr-input{background:#fff!important;cursor:pointer}
.flatpickr-calendar{font-family:inherit;box-shadow:0 8px 24px rgba(0,0,0,.15)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🚗</div>
    <div class="login-title">STK Weekend Mobility Car</div>
    <div class="login-sub">주말 차량 추첨 신청 시스템</div>
    <button class="btn-ms-login" id="btn-login" disabled>
      <span>⏳</span> 로딩 중...
    </button>
    <div id="login-err" style="color:#c62828;font-size:.78rem;margin-top:10px"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-icon">🚗</div>
      <div>
        <div class="header-title">STK Weekend Mobility Car</div>
        <div class="header-sub">주말 차량 추첨 신청 시스템</div>
      </div>
    </div>
    <div class="header-right">
      <span id="user-name"></span>
      <span id="coupon-header" style="background:rgba(255,255,255,.15);padding:4px 10px;border-radius:20px;font-size:.78rem">🎫 쿠폰: -</span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('list')" id="tab-list">🗓 추첨 목록</button>
    <button class="tab-btn" onclick="switchTab('my')" id="tab-my">📋 내 신청</button>
    <button class="tab-btn" id="tab-admin" style="display:none" onclick="switchTab('admin')">⚙️ 관리자</button>
  </div>

  <!-- Page: List -->
  <div class="page active" id="page-list">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 style="font-size:1rem;font-weight:700">주말 차량 추첨</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="filter-status" onchange="loadEvents()" style="border:1px solid var(--gray2);border-radius:4px;padding:5px 10px;font-size:.8rem">
          <option value="all">전체</option>
          <option value="Active" selected>진행 중</option>
          <option value="Finished">종료</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="loadEvents()">🔄 새로고침</button>
      </div>
    </div>
    <div id="event-grid" class="event-grid"></div>
    <div id="list-pagination" class="pagination"></div>
  </div>

  <!-- Page: Detail -->
  <div class="page" id="page-detail">
    <div style="margin-bottom:12px">
      <button class="btn btn-secondary btn-sm" onclick="switchTab('list')">← 목록으로</button>
    </div>
    <div id="detail-content"></div>
  </div>

  <!-- Page: My -->
  <div class="page" id="page-my">
    <h2 style="font-size:1rem;font-weight:700;margin-bottom:16px">📋 내 신청 현황</h2>
    <div id="my-content"></div>
  </div>

  <!-- Page: Admin -->
  <div class="page" id="page-admin">
    <h2 style="font-size:1rem;font-weight:700;margin-bottom:16px">⚙️ 관리자</h2>

    <!-- 쿠폰 관리 -->
    <div class="card admin-section">
      <div class="card-header">
        <span class="card-title">🎫 쿠폰 관리</span>
        <button class="btn btn-secondary btn-sm" onclick="loadCouponData()">🔄 새로고침</button>
      </div>
      <div class="card-body">
        <div id="coupon-admin-table"></div>
      </div>
    </div>

    <!-- 추첨 이벤트 등록 -->
    <div class="card admin-section">
      <div class="card-header">
        <span class="card-title">➕ 추첨 이벤트 등록</span>
      </div>
      <div class="card-body">
        <div class="form-grid" style="margin-bottom:12px">
          <div class="form-group">
            <label>이벤트 제목 *</label>
            <input type="text" id="adm-title" placeholder="Weekend Mobility Car for Employee(WK18)">
          </div>
          <div class="form-group">
            <label>주차 / 구분</label>
            <input type="text" id="adm-week" placeholder="WK18 또는 Lunar New Year">
          </div>
          <div class="form-group">
            <label>이용 시작 *</label>
            <input type="text" id="adm-start" placeholder="날짜 및 시간 선택" readonly class="fp-dt" style="width:100%;cursor:pointer">
          </div>
          <div class="form-group">
            <label>이용 종료 *</label>
            <input type="text" id="adm-end" placeholder="날짜 및 시간 선택" readonly class="fp-dt" style="width:100%;cursor:pointer">
          </div>
          <div class="form-group">
            <label>신청 마감 *</label>
            <input type="text" id="adm-deadline" placeholder="날짜 및 시간 선택" readonly class="fp-dt" style="width:100%;cursor:pointer">
          </div>
          <div class="form-group">
            <label>쿠폰 소진 수 *</label>
            <input type="number" id="adm-coupon-cost" value="1" min="1" placeholder="당첨 시 차감 쿠폰 수">
          </div>
        </div>
        <div class="form-group" style="margin-bottom:12px">
          <label>공지사항 / 안내</label>
          <textarea id="adm-notice" rows="3" placeholder="* Consecutive holidays&#10;* Additional Comment: ..."></textarea>
        </div>
        <div class="form-group" style="margin-bottom:12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px">
          <label style="color:#1d4ed8;font-weight:700">⏰ 자동 활성화 시간 <span style="font-weight:400;font-size:.78rem;color:#64748b">(선택 — 설정 시 해당 시간에 자동으로 Active 전환)</span></label>
          <input type="text" id="adm-auto-activate" placeholder="날짜 및 시간 선택 (선택 사항)" readonly class="fp-dt" style="width:100%;margin-top:6px;cursor:pointer">
        </div>
        <!-- 차량 등록 -->
        <div class="admin-section-title">차량 등록</div>
        <div id="vehicle-inputs">
          <div class="vehicle-row" data-idx="0">
            <input type="text" placeholder="모델 (e.g. A 220 Sedan)" style="flex:2">
            <input type="text" placeholder="색상 (e.g. 696-Night Black)" style="flex:2">
            <input type="text" placeholder="번호판 (e.g. 362마7342)" style="flex:1.5">
            <button class="btn btn-danger btn-sm" onclick="removeVehicleRow(this)">✕</button>
          </div>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="addVehicleRow()" style="margin-top:8px">+ 차량 추가</button>
        <div style="margin-top:16px;display:flex;gap:8px">
          <button class="btn btn-primary" onclick="saveEvent()">💾 임시 저장</button>
          <button class="btn btn-success" onclick="saveEvent('Active')">🚀 저장 후 즉시 활성화</button>
        </div>
      </div>
    </div>

    <!-- 이벤트 목록 관리 -->
    <div class="card admin-section">
      <div class="card-header">
        <span class="card-title">📋 이벤트 관리</span>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="adm-evt-filter" onchange="renderAdminEventList()" style="border:1px solid var(--gray2);border-radius:4px;padding:4px 10px;font-size:.8rem">
            <option value="all">전체</option>
            <option value="Active">🟢 진행 중</option>
            <option value="Draft">🟡 초안</option>
            <option value="Finished">⚫ 종료</option>
          </select>
          <button class="btn btn-secondary btn-sm" onclick="loadAdminEvents()">🔄 새로고침</button>
        </div>
      </div>
      <div class="card-body">
        <div id="admin-event-list"></div>
      </div>
    </div>

    <!-- 신청 기록 -->
    <div class="card admin-section">
      <div class="card-header" style="display:flex;align-items:center;justify-content:space-between">
        <span class="card-title">📋 신청 기록 (전체)</span>
        <button class="btn btn-secondary btn-sm" onclick="loadWinnerHistory()">🔄 새로고침</button>
      </div>
      <div class="card-body">
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
          <input type="text" id="hist-search" placeholder="🔍 이벤트명 / 신청자 검색" oninput="renderHistoryTable()"
            style="border:1px solid var(--gray2);border-radius:4px;padding:5px 10px;font-size:.82rem;flex:1;min-width:160px">
          <select id="hist-filter-status" onchange="renderHistoryTable()"
            style="border:1px solid var(--gray2);border-radius:4px;padding:5px 10px;font-size:.82rem">
            <option value="all">전체 결과</option>
            <option value="Winner">🏆 당첨</option>
            <option value="NotSelected">낙첨</option>
            <option value="Applied">신청중</option>
          </select>
          <select id="hist-filter-event" onchange="renderHistoryTable()"
            style="border:1px solid var(--gray2);border-radius:4px;padding:5px 10px;font-size:.82rem;max-width:200px">
            <option value="all">전체 이벤트</option>
          </select>
        </div>
        <div id="winner-history-table"><div style="color:var(--gray3);font-size:.85rem">새로고침을 눌러 조회하세요.</div></div>
      </div>
    </div>
      <div class="card-header">
        <span class="card-title">🎰 추첨 실행</span>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const CLIENT_ID = '5e9dc4dc-8091-4d56-a016-9a4dc6ae669a';
const TENANT_ID = '19cab1f5-21f4-44df-8ac6-96d6ca595203';
const SITE_PATH = 'startruckkorea.sharepoint.com:/sites/STK-DB';
const GRAPH = 'https://graph.microsoft.com/v1.0';
const COUPON_FILE = 'WMC_Coupons.xlsx'; // SharePoint 문서 라이브러리에 있는 쿠폰 엑셀

const LIST_EVENTS  = 'WMC_Events';
const LIST_VEHICLES= 'WMC_Vehicles';
const LIST_APPS    = 'WMC_Applications';

let ADMIN_EMAILS = ['jimmy.lee@hyosung.com','hye-jin.yun@hyosung.com']; // system_config로 덮어씀
let _sysConfig = null;

let user = {}, siteId = '', msalApp = null;
let allEvents = [], myApplications = [];
let couponData = []; // [{email, name, coupon}]
let currentEvent = null;

// ═══════════════════════════════════════════
// MSAL AUTH
// ═══════════════════════════════════════════
async function initMSAL(){
  await loadScript('https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.28.0/lib/msal-browser.min.js');
  msalApp = new msal.PublicClientApplication({
    auth:{clientId:CLIENT_ID, authority:'https://login.microsoftonline.com/'+TENANT_ID, redirectUri:location.origin},
    cache:{cacheLocation:'sessionStorage'}
  });
  await msalApp.initialize();
  const redirect = await msalApp.handleRedirectPromise();
  if(redirect){ await boot(redirect.account); return; }
  const accounts = msalApp.getAllAccounts();
  if(accounts.length){ await boot(accounts[0]); return; }
  const btn = document.getElementById('btn-login');
  btn.disabled = false; btn.innerHTML = '<span>🔑</span> Microsoft 계정으로 로그인';
  btn.onclick = ()=>msalApp.loginRedirect({scopes:['User.Read','Sites.ReadWrite.All','Files.ReadWrite.All']});
}
function loadScript(src){ return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);}); }
async function token(){
  const acc=msalApp.getAllAccounts()[0];
  const r=await msalApp.acquireTokenSilent({scopes:['Sites.ReadWrite.All','Files.ReadWrite.All'],account:acc}).catch(()=>msalApp.acquireTokenRedirect({scopes:['Sites.ReadWrite.All','Files.ReadWrite.All']}));
  return r.accessToken;
}
function logout(){ msalApp.logoutRedirect(); }

// ═══════════════════════════════════════════
// API
// ═══════════════════════════════════════════
async function api(path, method='GET', body=null){
  const t = await token();
  const opts = {method, headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json'}};
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(GRAPH+path, opts);
  if(!r.ok){ const e=await r.text(); throw new Error(r.status+' '+e); }
  return method==='DELETE' ? null : r.json();
}
function loading(v, msg='처리 중입니다...'){
  const el=document.getElementById('loading');
  el.style.display=v?'flex':'none';
  document.getElementById('loading-msg').textContent=msg;
}

function showToast(msg, icon='✅', duration=1800){
  const el = document.getElementById('toast-popup');
  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-msg').textContent = msg;
  el.style.display='block';
  el.style.opacity='1';
  clearTimeout(el._timer);
  el._timer = setTimeout(()=>{
    el.style.transition='opacity .4s';
    el.style.opacity='0';
    setTimeout(()=>{ el.style.display='none'; el.style.transition=''; }, 400);
  }, duration);
}

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
// SYSTEM CONFIG
// ═══════════════════════════════════════════
async function loadSystemConfig() {
  if (_sysConfig) return _sysConfig;
  try {
    const t = await token();
    const drivesRes = await api('/sites/' + siteId + '/drives');
    const docDrive = (drivesRes.value || []).find(d =>
      ['Documents','문서','Shared Documents','AttachedFiles'].includes(d.name)
    ) || (drivesRes.value && drivesRes.value[0]);
    if (!docDrive) throw new Error('Drive not found');
    const res = await fetch(
      'https://graph.microsoft.com/v1.0/drives/' + docDrive.id + '/root:/system_config_final.xlsx:/content',
      { headers: { Authorization: 'Bearer ' + t } }
    );
    if (!res.ok) throw new Error('system_config_final.xlsx not found (' + res.status + ')');
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
    const cfg = {};
    rows.forEach(row => {
      const key = (row[0] || '').toString().trim();
      if (!key || key.startsWith('[') || key.startsWith('■') || key === '설정 키 (KEY)') return;
      cfg[key] = {
        name:  (row[1] || '').toString().trim(),
        email: (row[2] || '').toString().trim()
      };
    });
    _sysConfig = cfg;
    return cfg;
  } catch(e) {
    console.warn('[SystemConfig] 로드 실패:', e.message);
    return null;
  }
}

// ═══════════════════════════════════════════
async function boot(account){
  user = {name: account.name, email: account.username};
  document.getElementById('user-name').textContent = user.name;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // 관리자 탭 표시
  if(ADMIN_EMAILS.map(e=>e.toLowerCase()).includes(user.email.toLowerCase())){
    document.getElementById('tab-admin').style.display = '';
  }

  try {
    const site = await api('/sites/'+SITE_PATH);
    siteId = site.id;

    // system_config_final.xlsx 로드 → 관리자/연락처 갱신
    try {
      const cfg = await loadSystemConfig();
      if (cfg) {
        // WM_ADMIN_1, WM_ADMIN_2 ... 자동 확장
        const adminEmails = [];
        let n = 1;
        while (cfg['WM_ADMIN_' + n]) {
          const e = cfg['WM_ADMIN_' + n].email;
          if (e) adminEmails.push(e);
          n++;
        }
        if (adminEmails.length) {
          ADMIN_EMAILS.splice(0, ADMIN_EMAILS.length, ...adminEmails);
          // 관리자 탭 재확인
          if (ADMIN_EMAILS.map(e=>e.toLowerCase()).includes(user.email.toLowerCase())) {
            document.getElementById('tab-admin').style.display = '';
          }
        }
        // WM_CONTACT → 헤더 문의 이메일 표시
        if (cfg['WM_CONTACT'] && cfg['WM_CONTACT'].email) {
          const subEl = document.querySelector('.header-sub');
          if (subEl) subEl.textContent = '문의: ' + cfg['WM_CONTACT'].email;
        }
      }
    } catch(cfgErr) { console.warn('[SystemConfig]', cfgErr.message); }

    await Promise.all([loadEvents(), loadMyCoupons(), loadMyApplications()]);
    loadDrawSchedule();
    // 로그인 직후 즉시 자동 활성화 체크
    checkAutoActivate();
  } catch(e){ alert('초기화 오류: '+e.message); }
}

// ═══════════════════════════════════════════
// TAB
// ═══════════════════════════════════════════
let _fpInited = false;
function initFlatpickrs(){
  if(_fpInited) return;
  _fpInited = true;
  const fpCfg = {
    locale:'ko', enableTime:true, time_24hr:true,
    dateFormat:'Y-m-d H:i', allowInput:false,

function fpGet(id){

function fpSet(id, iso){

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));

// ═══════════════════════════════════════════
// FORMAT HELPERS
// ═══════════════════════════════════════════
function fmtDT(iso){
  if(!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('ko-KR',{month:'long',day:'numeric'})
    + ' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function fmtDate(iso){ if(!iso)return''; const d=new Date(new Date(iso).getTime()+9*3600*1000); return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0')+' '+String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0'); }

// ═══════════════════════════════════════════
// EVENTS (LIST PAGE)
// ═══════════════════════════════════════════
async function loadEvents(){
  const statusFilter = document.getElementById('filter-status').value;
  loading(true,'이벤트 로딩 중...');
  try{
    const data = await api(`/sites/${siteId}/lists/${LIST_EVENTS}/items?$expand=fields&$top=200`);
    const sorted = data.value.sort((a,b)=>new Date(b.fields.AvailableStart)-new Date(a.fields.AvailableStart));
    allEvents = statusFilter !== 'all'
      ? sorted.filter(ev => (ev.fields.Status||'') === statusFilter)
      : sorted;
    renderEventGrid(allEvents);
  }catch(e){ alert('이벤트 로드 실패: '+e.message); }
  finally{ loading(false); }
}

const EVT_GRID_PAGE_SIZE = 9;
let _evtGridPage = 1;
let _evtGridAll = [];

function renderEventGrid(events){
  _evtGridAll = events;
  _evtGridPage = 1;
  _renderEventGridPage();
}

function _renderEventGridPage(){
  const events = _evtGridAll;
  const grid = document.getElementById('event-grid');
  if(!events.length){
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🚗</div><div>이벤트가 없습니다</div></div>';
    document.getElementById('list-pagination').innerHTML = '';
    return;
  }
  const total = events.length;
  const totalPages = Math.max(1, Math.ceil(total/EVT_GRID_PAGE_SIZE));
  if(_evtGridPage > totalPages) _evtGridPage = totalPages;
  const start = (_evtGridPage-1)*EVT_GRID_PAGE_SIZE;
  const pageEvents = events.slice(start, start+EVT_GRID_PAGE_SIZE);

  // 페이지네이션
  if(totalPages > 1){
    let pg = `<span style="font-size:.8rem;color:var(--text2)">${_evtGridPage}/${totalPages}</span>`;
    const btn = (label, page, disabled) =>
      `<button onclick="_evtGridPage=${page};_renderEventGridPage()" ${disabled?'disabled':''} style="border:1px solid var(--gray2);background:${disabled?'var(--gray)':'#fff'};border-radius:4px;padding:4px 8px;cursor:${disabled?'default':'pointer'};font-size:.8rem">${label}</button>`;
    document.getElementById('list-pagination').innerHTML =
      btn('«',1,_evtGridPage===1)+btn('‹',_evtGridPage-1,_evtGridPage===1)+pg+
      btn('›',_evtGridPage+1,_evtGridPage===totalPages)+btn('»',totalPages,_evtGridPage===totalPages);
  } else {
    document.getElementById('list-pagination').innerHTML = '';
  }

  grid.innerHTML = pageEvents.map(ev=>{
    const f = ev.fields;
    const isActive = f.Status === 'Active';
    const isFinished = f.Status === 'Finished';
    const now = new Date();
    const isDeadlinePassed = isActive && new Date(f.Deadline) < now;
    const myApp = myApplications.find(a=>Number(a.fields.EventID)===Number(ev.id));
    const isDrawn = isFinished || (isDeadlinePassed && myApp && (myApp.fields.Status==='Winner'||myApp.fields.Status==='NotSelected'));
    const isFaded = isFinished || isDeadlinePassed;
    const headerClass = isDrawn ? 'drawn' : isDeadlinePassed ? 'deadline-passed' : '';
    const cardClass = (isActive&&!isDeadlinePassed) ? 'active-event' : isFaded ? 'faded' : '';
    const badgeClass = (isActive&&!isDeadlinePassed) ? 'active'
      : isDrawn ? 'drawn'
      : isDeadlinePassed ? 'deadline-passed'
      : 'draft';
    const badgeLabel = (isActive&&!isDeadlinePassed) ? '🟢 신청 중'
      : isDrawn ? '✅ 추첨완료'
      : isDeadlinePassed ? '🔒 신청마감'
      : '🟡 Draft';
    const appBadge = myApp ? (myApp.fields.Status==='Winner'
      ? '<span class="app-status winner">🏆 당첨</span>'
      : myApp.fields.Status==='Applied'
      ? '<span class="app-status applied">✅ 신청완료</span>'
      : myApp.fields.Status==='NotSelected'
      ? '<span class="app-status not-selected">낙첨</span>'
      : '') : '';
    return `<div class="event-card ${cardClass}" onclick="showDetail(${ev.id})">
      <div class="event-card-header ${headerClass}">
        <div class="event-card-title">${f.Title||''}</div>
        <div class="event-card-week">${f.WeekNumber||''}</div>
      </div>
      <div class="event-card-body">
        <div class="event-info-row">📅 <strong>${fmtDT(f.AvailableStart)}</strong> ~ <strong>${fmtDT(f.AvailableEnd)}</strong></div>
        <div class="event-info-row">⏰ 신청 마감: <strong style="color:${isDeadlinePassed?'var(--red)':'inherit'}">${fmtDT(f.Deadline)}</strong></div>
        <div class="event-info-row">🎫 쿠폰 소진: <strong>${f.CouponCost||1}개</strong></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
          <span class="status-badge ${badgeClass}">${badgeLabel}</span>
          ${appBadge}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
// DETAIL PAGE
// ═══════════════════════════════════════════
async function showDetail(eventId){
  loading(true,'상세 정보 로딩...');
  try{
    const [evData, vehs, apps] = await Promise.all([
      api(`/sites/${siteId}/lists/${LIST_EVENTS}/items/${eventId}?$expand=fields`),
      api(`/sites/${siteId}/lists/${LIST_VEHICLES}/items?$expand=fields&$top=50`),
      api(`/sites/${siteId}/lists/${LIST_APPS}/items?$expand=fields&$top=500`)
    ]);
    currentEvent = evData;
    const f = evData.fields;
    const isActive = f.Status === 'Active';
    const isPast = new Date(f.Deadline) < new Date();
    const vehList = vehs.value.filter(v=>Number(v.fields.EventID)===Number(eventId));
    const appList = apps.value.filter(a=>Number(a.fields.EventID)===Number(eventId));

    // 각 차량별 지원자 수, 내 상태
    // 이 이벤트에서 이미 신청한 차량이 있는지 확인
    const alreadyApplied = appList.find(a=>
      (a.fields.ApplicantEmail||'').toLowerCase()===user.email.toLowerCase() &&
      a.fields.Status==='Applied'
    );

    const vehRows = vehList.map(v=>{
      const vf = v.fields;
      const vApps = appList.filter(a=>Number(a.fields.VehicleID)===Number(v.id));
      const myApp = vApps.find(a=>(a.fields.ApplicantEmail||'').toLowerCase()===user.email.toLowerCase());
      const winner = vApps.find(a=>a.fields.Status==='Winner');

      let actionBtn = '';
      if(isActive && !isPast){
        if(myApp && myApp.fields.Status==='Applied'){
          actionBtn = `<button class="btn-cancel" onclick="cancelApplication(${myApp.id},${eventId});event.stopPropagation()">취소</button>`;
        } else if(!myApp && !alreadyApplied){
          actionBtn = `<button class="btn-apply" onclick="applyVehicle(${eventId},${v.id},'${(vf.Model||'').replace(/'/g,"\'")}');event.stopPropagation()">신청</button>`;
        }
      }

      let appStatusHtml = '';
      if(myApp){
        if(myApp.fields.Status==='Winner') appStatusHtml='<span class="app-status winner">🏆 Winner</span>';
        else if(myApp.fields.Status==='Applied') appStatusHtml='<span class="app-status applied">✅ Applied</span>';
        else if(myApp.fields.Status==='NotSelected') appStatusHtml='<span class="app-status not-selected">낙첨</span>';
      } else if(winner){
        appStatusHtml='<span class="app-status not-selected">마감</span>';
      }

      return `<tr>
        <td>${vf.Model||'-'}</td>
        <td>${vf.Color||'-'}</td>
        <td>${vf.PlateNo||'-'}</td>
        <td style="text-align:center">${vApps.filter(a=>a.fields.Status==='Applied'||a.fields.Status==='Winner').length}</td>
        <td>${winner ? winner.fields.ApplicantName||'-' : '-'}</td>
        <td>${appStatusHtml} ${actionBtn}</td>
      </tr>`;
    }).join('');

    const myCoupon = couponData.find(c=>(c.email||'').toLowerCase()===user.email.toLowerCase());
    const couponLeft = myCoupon ? (myCoupon.coupon||0) : 0;
    const couponCost = f.CouponCost||1;

    document.getElementById('detail-content').innerHTML = `
      <div class="detail-header">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div class="detail-title">${f.Title||''}</div>
          <span class="status-badge ${f.Status==='Active'?'active':f.Status==='Finished'?'finished':'draft'}">
            ${f.Status==='Active'?'🟢 In Progress':f.Status==='Finished'?'⚫ Finished':'🟡 Draft'}
          </span>
        </div>
        <div class="detail-meta-grid">
          <div class="detail-meta-item">
            <div class="detail-meta-label">이용 가능 기간</div>
            <div class="detail-meta-value">${fmtDT(f.AvailableStart)} ~ ${fmtDT(f.AvailableEnd)}</div>
          </div>
          <div class="detail-meta-item">
            <div class="detail-meta-label">신청 마감</div>
            <div class="detail-meta-value" style="color:${isPast?'var(--red)':'var(--blue)'}">${fmtDT(f.Deadline)}</div>
          </div>
          <div class="detail-meta-item">
            <div class="detail-meta-label">내 쿠폰 잔여</div>
            <div class="detail-meta-value">🎫 ${couponLeft}개</div>
          </div>
          <div class="detail-meta-item">

async function loadMyCoupons(){
  try{
    const t = await token();
    const drivesRes = await api('/sites/'+siteId+'/drives');
    const docDrive = (drivesRes.value||[]).find(d=>['Documents','문서','Shared Documents'].includes(d.name))||drivesRes.value?.[0];
    if(!docDrive) throw new Error('드라이브를 찾을 수 없습니다.');
    const res = await fetch('https://graph.microsoft.com/v1.0/drives/'+docDrive.id+'/root:/employee_search.xlsx:/content',{headers:{Authorization:'Bearer '+t}});
    if(!res.ok) throw new Error('employee_search.xlsx 로드 실패 ('+res.status+')');
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf,{type:'array'});
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
    let emailCol=-1, wmcCol=-1, nameCol=-1;
    const header = rows[0]||[];
    header.forEach((h,i)=>{
      const v=(h||'').toString().trim().toLowerCase();
      if(v==='email') emailCol=i;
      if(v==='wmc') wmcCol=i;
      if(v==='engname') nameCol=i;
    });
    if(emailCol<0||wmcCol<0) throw new Error('Email 또는 WMC 컬럼을 찾을 수 없습니다.');
    couponData = rows.slice(1)
      .filter(r=>(r[emailCol]||'').toString().trim())
      .map(r=>({
        email:(r[emailCol]||'').toString().trim(),
        name:(r[nameCol]||'').toString().trim(),
        coupon:Number((r[wmcCol]||0))
      }));
    const mine = couponData.find(c=>c.email.toLowerCase()===user.email.toLowerCase());
    document.getElementById('coupon-header').textContent='🎫 쿠폰: '+(mine?mine.coupon:0)+'개';
  }catch(e){ console.warn('쿠폰 로드 실패',e); }
}

async function updateCouponInExcel(email, newCount){
  try{
    const t = await token();
    const drivesRes = await api('/sites/'+siteId+'/drives');
    const docDrive = (drivesRes.value||[]).find(d=>['Documents','문서','Shared Documents'].includes(d.name))||drivesRes.value?.[0];
    const res = await fetch('https://graph.microsoft.com/v1.0/drives/'+docDrive.id+'/root:/employee_search.xlsx:/content',{headers:{Authorization:'Bearer '+t}});
    if(!res.ok) throw new Error('엑셀 로드 실패');
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf,{type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws,{header:1});
    const header = rows[0]||[];
    let emailCol=-1, wmcCol=-1;
    header.forEach((h,i)=>{const v=(h||'').toString().trim().toLowerCase();if(v==='email')emailCol=i;if(v==='wmc')wmcCol=i;});
    if(emailCol<0||wmcCol<0) throw new Error('컬럼 없음');
    for(let r=1;r<rows.length;r++){
      if((rows[r][emailCol]||'').toString().trim().toLowerCase()===email.toLowerCase()){
        const cell = XLSX.utils.encode_cell({r,c:wmcCol});
        ws[cell] = {t:'n', v:newCount};
        break;
      }
    }
    const newBuf = XLSX.write(wb,{type:'array',bookType:'xlsx'});
    const putRes = await fetch('https://graph.microsoft.com/v1.0/drives/'+docDrive.id+'/root:/employee_search.xlsx:/content',{
      method:'PUT', headers:{Authorization:'Bearer '+t,'Content-Type':'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'},
      body:new Blob([newBuf])
    });
    if(!putRes.ok) throw new Error('엑셀 저장 실패 ('+putRes.status+')');
  }catch(e){ console.error('쿠폰 업데이트 실패:',e); throw e; }
}

async function applyVehicle(eventId, vehicleId, vehicleName){
  const myCoupon = couponData.find(c=>(c.email||'').toLowerCase()===user.email.toLowerCase());
  const ev = allEvents.find(e=>Number(e.id)===Number(eventId));
  const couponCost = ev ? (ev.fields.CouponCost||1) : 1;

  if(!myCoupon || myCoupon.coupon < couponCost){
    alert(`쿠폰이 부족합니다.
현재 쿠폰: ${myCoupon?myCoupon.coupon:0}개
필요 쿠폰: ${couponCost}개`); return;
  }

  showConfirmModal(`"${vehicleName}" 에 신청하시겠습니까?
쿠폰 ${couponCost}개가 차감됩니다.`, async ()=>{
    loading(true,'신청 처리 중...');
    try{
      // 0. 중복 신청 방지: 최신 신청 현황 재확인
      loading(true,'신청 현황 확인 중...');
      const freshAppsRes = await api(`/sites/${siteId}/lists/${LIST_APPS}/items?$expand=fields&$top=200`);
      const freshApps = freshAppsRes.value||[];
      const alreadyApplied = freshApps.find(a=>
        Number(a.fields.EventID)===Number(eventId) &&
        (a.fields.ApplicantEmail||'').toLowerCase()===user.email.toLowerCase() &&
        a.fields.Status==='Applied'
      );
      if(alreadyApplied){
        loading(false);
        showToast('이미 이 이벤트에 신청하셨습니다.', '⚠️', 3000);
        await showDetail(eventId);
        return;
      }
      // 1. 지원 등록
      loading(true,'신청 처리 중...');
      await api(`/sites/${siteId}/lists/${LIST_APPS}/items`,'POST',{fields:{
        Title:'WMC-'+new Date().toISOString().slice(0,10)+'-tmp',
        EventID:eventId, VehicleID:vehicleId,
        ApplicantEmail:user.email, ApplicantName:user.name,
        Status:'Applied', AppliedDate:new Date().toISOString()
      }});
      // 2. 쿠폰 차감 (실패해도 신청은 유지, 재시도 1회)
      if(myCoupon){
        const newCoupon = myCoupon.coupon - couponCost;
        try{
          await updateCouponInExcel(myCoupon.email, newCoupon);
        }catch(excelErr){
          // 엑셀 충돌 시 1초 대기 후 재시도
          loading(true,'쿠폰 처리 재시도 중...');
          await new Promise(r=>setTimeout(r,1000));
          try{
            await updateCouponInExcel(myCoupon.email, newCoupon);
          }catch(retryErr){
            // 재시도도 실패 시 관리자 안내
            loading(false);
            showToast('신청은 완료됐으나 쿠폰 차감에 실패했습니다. 관리자에게 문의해주세요.', '⚠️', 5000);
            await Promise.all([loadMyCoupons(), loadMyApplications()]);
            await showDetail(eventId);
            return;
          }
        }
        myCoupon.coupon = newCoupon;
      }
      await Promise.all([loadMyCoupons(), loadMyApplications()]);
      await showDetail(eventId);
      showToast('신청이 완료되었습니다!', '✅');
    }catch(e){
      if(e.message && e.message.includes('409')){
        showToast('다른 사용자가 처리 중입니다. 잠시 후 다시 시도해주세요.', '⚠️', 4000);
      } else {
        showToast('신청 실패: '+e.message, '❌', 4000);
      }
    }
    finally{ loading(false); }
  });
}

async function cancelApplication(appId, eventId){
  const app = myApplications.find(a=>Number(a.id)===Number(appId));
  const ev = allEvents.find(e=>Number(e.id)===Number(eventId));
  const couponCost = ev ? (ev.fields.CouponCost||1) : 1;

  showConfirmModal('신청을 취소하시겠습니까? 취소 시 쿠폰이 반환됩니다.', async ()=>{
    loading(true,'취소 처리 중...');
    try{
      await api(`/sites/${siteId}/lists/${LIST_APPS}/items/${appId}`,'DELETE');
      // 쿠폰 반환
      const myCoupon = couponData.find(c=>(c.email||'').toLowerCase()===user.email.toLowerCase());
      if(myCoupon){
        const newCoupon = myCoupon.coupon + couponCost;
        await updateCouponInExcel(myCoupon.email, newCoupon);
        myCoupon.coupon = newCoupon;
      }
      await Promise.all([loadMyCoupons(), loadMyApplications()]);
      await showDetail(eventId);
    }catch(e){ alert('취소 실패: '+e.message); }
    finally{ loading(false); }
  });
}

}

// ── 내 신청 페이지네이션 ──
const MY_PAGE_SIZE = 5;
let _myPage = 1;
let _myAppsData = [];

async function loadMyPage(){
  loading(true);
  try{
    await loadMyApplications();
    if(!myApplications.length){
      document.getElementById('my-content').innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div>신청 내역이 없습니다</div></div>';
      return;
    }
    const allVehs = await api(`/sites/${siteId}/lists/${LIST_VEHICLES}/items?$expand=fields&$top=500`);
    const allApps = await api(`/sites/${siteId}/lists/${LIST_APPS}/items?$expand=fields&$top=500`);
    _myAppsData = {apps: myApplications.sort((a,b)=>new Date(b.fields.AppliedDate)-new Date(a.fields.AppliedDate)), vehs: allVehs, allApps};
    _myPage = 1;
    renderMyPage();
  }catch(e){ console.error(e); }
  finally{ loading(false); }
}

function renderMyPage(){
  const apps = _myAppsData.apps||[];
  const allVehs = _myAppsData.vehs;
  const allApps = _myAppsData.allApps;
  const total = apps.length;
  const totalPages = Math.max(1, Math.ceil(total/MY_PAGE_SIZE));
  if(_myPage > totalPages) _myPage = totalPages;
  const start = (_myPage-1)*MY_PAGE_SIZE;
  const pageData = apps.slice(start, start+MY_PAGE_SIZE);

  const html = pageData.map(a=>{
    const f = a.fields;
    const ev = allEvents.find(e=>Number(e.id)===Number(f.EventID));
    const veh = allVehs.value.find(v=>Number(v.id)===Number(f.VehicleID));
    const vf = veh?.fields||{};
    const competitors = allApps.value.filter(ap=>Number(ap.fields.VehicleID)===Number(f.VehicleID)&&ap.fields.Status!=='NotSelected').length;
    const statusLabel = f.Status==='Winner'?'🏆 당첨':f.Status==='Applied'?'✅ 신청중':'낙첨';
    const statusClass = f.Status==='Winner'?'winner':f.Status==='Applied'?'applied':'not-selected';
    const couponCost = ev?.fields?.CouponCost||'-';
    return `<div class="card" style="margin-bottom:12px;cursor:pointer" onclick="toggleMyDetail(this)">
      <div class="card-body" style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-weight:700;margin-bottom:3px">${ev?ev.fields.Title:('이벤트 #'+f.EventID)}</div>
          <div style="font-size:.78rem;color:var(--text2)">신청일: ${fmtDate(f.AppliedDate)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="app-status ${statusClass}">${statusLabel}</span>
          <span style="font-size:.75rem;color:var(--text2)">▼</span>
        </div>
      </div>
      <div class="my-detail" style="display:none;border-top:1px solid var(--gray2);padding:14px 16px;background:#f8fafc">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:.83rem">
          <div><span style="color:var(--text2)">차량 모델</span><br><strong>${vf.Model||'-'}</strong></div>
          <div><span style="color:var(--text2)">색상</span><br><strong>${vf.Color||'-'}</strong></div>
          <div><span style="color:var(--text2)">번호판</span><br><strong>${vf.PlateNo||'-'}</strong></div>
          <div><span style="color:var(--text2)">경쟁 인원</span><br><strong>${competitors}명</strong></div>
          <div><span style="color:var(--text2)">사용 쿠폰</span><br><strong>🎫 ${couponCost}개</strong></div>
          <div><span style="color:var(--text2)">이용 기간</span><br><strong>${ev?fmtDT(ev.fields.AvailableStart)+' ~<br>'+fmtDT(ev.fields.AvailableEnd):'-'}</strong></div>
        </div>
      </div>
    </div>`;
  }).join('');

  const pager = totalPages > 1 ? `
    <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px;font-size:.82rem">
      <button class="btn btn-secondary btn-sm" onclick="myPageGo(1)" ${_myPage===1?'disabled':''}>«</button>
      <button class="btn btn-secondary btn-sm" onclick="myPageGo(${_myPage-1})" ${_myPage===1?'disabled':''}>‹</button>
      <span style="color:var(--text2)">${_myPage} / ${totalPages}</span>
      <button class="btn btn-secondary btn-sm" onclick="myPageGo(${_myPage+1})" ${_myPage===totalPages?'disabled':''}>›</button>
      <button class="btn btn-secondary btn-sm" onclick="myPageGo(${totalPages})" ${_myPage===totalPages?'disabled':''}>»</button>
    </div>` : '';

  document.getElementById('my-content').innerHTML = html + pager;
}

function myPageGo(p){
  const totalPages = Math.max(1, Math.ceil((_myAppsData.apps||[]).length/MY_PAGE_SIZE));
  _myPage = Math.max(1, Math.min(totalPages, p));
  renderMyPage();
}

function toggleMyDetail(card){
  const detail = card.querySelector('.my-detail');
  const arrow = card.querySelector('span[style*="font-size:.75rem"]');
  if(detail.style.display==='none'){ detail.style.display='block'; if(arrow) arrow.textContent='▲'; }
  else { detail.style.display='none'; if(arrow) arrow.textContent='▼'; }
}

let _histApps=[], _histVehs=[], _histEvs=[];

async function loadWinnerHistory(){
  loading(true,'신청 기록 조회 중...');
  try{
    const [appsData, vehsData, evData] = await Promise.all([
      api(`/sites/${siteId}/lists/${LIST_APPS}/items?$expand=fields&$top=500`),
      api(`/sites/${siteId}/lists/${LIST_VEHICLES}/items?$expand=fields&$top=200`),
      api(`/sites/${siteId}/lists/${LIST_EVENTS}/items?$expand=fields&$top=100`)
    ]);
    _histApps = appsData.value.sort((a,b)=>new Date(b.fields.AppliedDate)-new Date(a.fields.AppliedDate));
    _histVehs = vehsData.value;
    _histEvs  = evData.value;

    // 이벤트 필터 드롭다운 채우기
    const evSel = document.getElementById('hist-filter-event');
    if(evSel){
      const evIds = [...new Set(_histApps.map(a=>a.fields.EventID))];
      evSel.innerHTML = '<option value="all">전체 이벤트</option>'
        + evIds.map(id=>{ const ev=_histEvs.find(e=>Number(e.id)===Number(id)); return `<option value="${id}">${ev?ev.fields.Title:'#'+id}</option>`; }).join('');
    }

    renderHistoryTable();
  }catch(e){ console.error(e); document.getElementById('winner-history-table').innerHTML='<div style="color:var(--red)">조회 실패: '+e.message+'</div>'; }
  finally{ loading(false); }

function renderHistoryTable(){
  const search    = (document.getElementById('hist-search')||{value:''}).value.toLowerCase();
  const statusF   = (document.getElementById('hist-filter-status')||{value:'all'}).value;
  const eventF    = (document.getElementById('hist-filter-event')||{value:'all'}).value;

  const statusLabel = s => s==='Winner'?'🏆 당첨':s==='NotSelected'?'낙첨':s==='Applied'?'신청중':s||'-';
  const statusColor = s => s==='Winner'?'var(--green)':s==='NotSelected'?'var(--gray3)':s==='Applied'?'var(--blue)':'var(--text2)';

  const filtered = _histApps.filter(a=>{
    const f = a.fields;
    const ev = _histEvs.find(e=>Number(e.id)===Number(f.EventID));
    const evTitle = ev?ev.fields.Title:'';
    const name = (f.ApplicantName||f.ApplicantEmail||'').toLowerCase();
    if(statusF!=='all' && f.Status!==statusF) return false;
    if(eventF!=='all' && Number(f.EventID)!==Number(eventF)) return false;
    if(search && !evTitle.toLowerCase().includes(search) && !name.includes(search)) return false;
    return true;
  });

  if(!_histApps.length){
    document.getElementById('winner-history-table').innerHTML='<div style="color:var(--gray3);font-size:.85rem">신청 기록이 없습니다.</div>';
    return;
  }

  if(!filtered.length){
    document.getElementById('winner-history-table').innerHTML='<div style="color:var(--gray3);font-size:.85rem;padding:12px 0">검색 결과가 없습니다.</div>';
    return;
  }

  const html = `<div style="font-size:.78rem;color:var(--text2);margin-bottom:6px">${filtered.length}건</div>
    <table style="width:100%;border-collapse:collapse;font-size:.82rem">
      <thead><tr style="background:var(--blue);color:#fff">
        <th style="padding:8px 10px;text-align:left">이벤트</th>
        <th style="padding:8px 10px;text-align:left">신청자</th>
        <th style="padding:8px 10px;text-align:left">차량</th>
        <th style="padding:8px 10px;text-align:left">번호판</th>
        <th style="padding:8px 10px;text-align:center">경쟁인원</th>
        <th style="padding:8px 10px;text-align:center">결과</th>
        <th style="padding:8px 10px;text-align:left">신청일</th>
      </tr></thead>
      <tbody>${filtered.map(a=>{
        const f = a.fields;
        const ev = _histEvs.find(e=>Number(e.id)===Number(f.EventID));
        const veh = _histVehs.find(v=>Number(v.id)===Number(f.VehicleID));
        const totalApps = _histApps.filter(ap=>Number(ap.fields.VehicleID)===Number(f.VehicleID)).length;
        const rowBg = f.Status==='Winner'?'#f0fff4':'';
        return `<tr style="border-bottom:1px solid var(--gray2);background:${rowBg}">
          <td style="padding:8px 10px;font-weight:600">${ev?ev.fields.Title:('#'+f.EventID)}</td>
          <td style="padding:8px 10px">${f.ApplicantName||f.ApplicantEmail||'-'}</td>
          <td style="padding:8px 10px">${veh?veh.fields.Model||'-':'-'}</td>
          <td style="padding:8px 10px">${veh?veh.fields.PlateNo||'-':'-'}</td>
          <td style="padding:8px 10px;text-align:center">${totalApps}명</td>
          <td style="padding:8px 10px;text-align:center;font-weight:700;color:${statusColor(f.Status)}">${statusLabel(f.Status)}</td>
          <td style="padding:8px 10px;color:var(--text2)">${fmtDate(f.AppliedDate)}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  document.getElementById('winner-history-table').innerHTML = html;
}

  }
  _editEventId = evId;

  // 폼에 기존 데이터 채우기
  document.getElementById('adm-title').value = f.Title||'';
  document.getElementById('adm-week').value = f.WeekNumber||'';
  fpSet('adm-start', f.AvailableStart||'');
  fpSet('adm-end', f.AvailableEnd||'');
  fpSet('adm-deadline', f.Deadline||'');
  fpSet('adm-auto-activate', f.AutoActivateAt||'');
  document.getElementById('adm-coupon-cost').value = f.CouponCost||1;
  document.getElementById('adm-notice').value = f.Notice ? f.Notice.replace(/<[^>]*>/g,'').replace(/&nbsp;/g,' ').trim() : '';

  // 차량 목록 채우기
  const vehs = await api(`/sites/${siteId}/lists/${LIST_VEHICLES}/items?$expand=fields&$top=50`);
  const evVehs = vehs.value.filter(v=>Number(v.fields.EventID)===Number(evId));
  const vInp = document.getElementById('vehicle-inputs');
  vInp.innerHTML = evVehs.map(v=>`
    <div class="vehicle-row" data-veh-id="${v.id}">
      <input type="text" placeholder="모델" style="flex:2" value="${v.fields.Model||''}">
      <input type="text" placeholder="색상" style="flex:2" value="${v.fields.Color||''}">
      <input type="text" placeholder="번호판" style="flex:1.5" value="${v.fields.PlateNo||''}">
      <button class="btn btn-danger btn-sm" onclick="removeVehicleRow(this)">✕</button>
    </div>`).join('') || `<div class="vehicle-row"><input type="text" placeholder="모델" style="flex:2"><input type="text" placeholder="색상" style="flex:2"><input type="text" placeholder="번호판" style="flex:1.5"><button class="btn btn-danger btn-sm" onclick="removeVehicleRow(this)">✕</button></div>`;

  // 폼 제목 변경 및 버튼 업데이트

  document.querySelector('[onclick="saveEvent()"]').textContent = '💾 수정 저장';
  document.querySelector('[onclick="saveEvent(\'Active\')"]').textContent = '🚀 수정 후 활성화';

  // 폼으로 스크롤
  document.getElementById('adm-title').scrollIntoView({behavior:'smooth', block:'center'});
}

async function saveEvent(forceStatus){
  const title = document.getElementById('adm-title').value.trim();
  const week  = document.getElementById('adm-week').value.trim();
  const startDt   = fpGet('adm-start');
  const endDt     = fpGet('adm-end');
  const deadlineDt= fpGet('adm-deadline');
  const autoActDt = fpGet('adm-auto-activate');
  const couponCost = parseInt(document.getElementById('adm-coupon-cost').value)||1;
  const notice = document.getElementById('adm-notice').value.trim();

  if(!title||!startDt||!endDt||!deadlineDt){ alert('필수 항목을 입력해주세요.'); return; }

  const vehicles = [];
  document.querySelectorAll('#vehicle-inputs .vehicle-row').forEach(row=>{
    const inputs = row.querySelectorAll('input');
    if(inputs[0].value.trim()){
      vehicles.push({
        id: row.dataset.vehId||null,
        model:inputs[0].value.trim(), color:inputs[1].value.trim(), plate:inputs[2].value.trim()
      });
    }
  });
  if(!vehicles.length){ alert('차량을 1개 이상 등록해주세요.'); return; }

  loading(true, _editEventId ? '이벤트 수정 중...' : '이벤트 저장 중...');
  try{
    const fields = {
      Title:title, WeekNumber:week,
      AvailableStart:startDt.toISOString(),
      AvailableEnd:endDt.toISOString(),
      Deadline:deadlineDt.toISOString(),
      CouponCost:couponCost, Notice:notice,
    };
    if(autoActDt) fields.AutoActivateAt = autoActDt.toISOString();
    else fields.AutoActivateAt = null; // null로 명시 전송 (SP 날짜컬럼 초기화)

    if(_editEventId){
      // 수정 모드: forceStatus 없으면 현재 SP 상태 그대로 유지 (자동활성화 보호)
      if(forceStatus){
        fields.Status = forceStatus;
      } else {
        const cur = await api(`/sites/${siteId}/lists/${LIST_EVENTS}/items/${_editEventId}?$expand=fields`);
        fields.Status = cur.fields.Status || 'Draft';
      }
      await api(`/sites/${siteId}/lists/${LIST_EVENTS}/items/${_editEventId}`,'PATCH',{fields});
      // 차량 업데이트: 기존 차량 PATCH, 새 차량 POST
      for(const v of vehicles){
        if(v.id){
          await api(`/sites/${siteId}/lists/${LIST_VEHICLES}/items/${v.id}`,'PATCH',{fields:{
            Title:v.model+' '+v.plate, Model:v.model, Color:v.color, PlateNo:v.plate
          }});
        } else {
          await api(`/sites/${siteId}/lists/${LIST_VEHICLES}/items`,'POST',{fields:{
            Title:v.model+' '+v.plate, EventID:parseInt(_editEventId),
            Model:v.model, Color:v.color, PlateNo:v.plate
          }});
        }
      }
      alert('✅ 수정 완료!'+(autoActDt?`\n\n⏰ 자동 활성화: ${autoActDt.toLocaleString('ko-KR')}`:'' ));
      _editEventId = null;
    } else {
      // 신규 등록
      fields.Status = forceStatus||'Draft';
      const item = await api(`/sites/${siteId}/lists/${LIST_EVENTS}/items`,'POST',{fields});
      const evId = item.id;
      for(const v of vehicles){
        await api(`/sites/${siteId}/lists/${LIST_VEHICLES}/items`,'POST',{fields:{
          Title:v.model+' '+v.plate, EventID:parseInt(evId),
          Model:v.model, Color:v.color, PlateNo:v.plate
        }});
      }
      alert('✅ 저장 완료!'+(autoActDt?`\n\n⏰ 자동 활성화: ${autoActDt.toLocaleString('ko-KR')}`:'' ));
    }

    // 폼 초기화
    ['adm-title','adm-week','adm-notice'].forEach(id=>document.getElementById(id).value='');
    ['adm-start','adm-end','adm-deadline','adm-auto-activate'].forEach(id=>fpClear(id));
    document.getElementById('adm-coupon-cost').value='1';
    document.getElementById('vehicle-inputs').innerHTML=`<div class="vehicle-row"><input type="text" placeholder="모델" style="flex:2"><input type="text" placeholder="색상" style="flex:2"><input type="text" placeholder="번호판" style="flex:1.5"><button class="btn btn-danger btn-sm" onclick="removeVehicleRow(this)">✕</button></div>`;
    document.querySelector('.card-title').textContent = '➕ 추첨 이벤트 등록';
    document.querySelector('[onclick="saveEvent()"]').textContent = '💾 임시 저장';
    document.querySelector('[onclick="saveEvent(\'Active\')"]').textContent = '🚀 저장 후 즉시 활성화';
    await loadAdminEvents();
  }catch(e){ alert('저장 실패: '+e.message); }
  finally{ loading(false); }
}

// ── 이벤트 관리 페이지네이션 ──
const EVT_PAGE_SIZE = 10;
let _evtPage = 1;
let _evtData = [];

async function loadAdminEvents(){
  try{
    const data = await api(`/sites/${siteId}/lists/${LIST_EVENTS}/items?$expand=fields&$top=100`);
    const drawSel = document.getElementById('draw-event-sel');
    drawSel.innerHTML='<option value="">추첨할 이벤트 선택</option>';
    _evtData = data.value;
    _evtData.forEach(ev=>{ if(ev.fields.Status==='Active') drawSel.innerHTML+=`<option value="${ev.id}">${ev.fields.Title}</option>`; });
    _evtPage = 1;
    renderAdminEventList();
  }catch(e){ console.error(e); }
}

function renderAdminEventList(){
  const filterVal = (document.getElementById('adm-evt-filter')||{value:'all'}).value;
  // Active → Draft → Finished 순 고정 정렬
  const activeItems = _evtData.filter(ev=>ev.fields.Status==='Active');
  const draftItems  = _evtData.filter(ev=>ev.fields.Status==='Draft');
  const otherItems  = _evtData.filter(ev=>ev.fields.Status!=='Active'&&ev.fields.Status!=='Draft');

  // 필터에 따라 페이지네이션 대상 결정
  let pagedSource;
  if(filterVal==='Active')      pagedSource = [];           // Active는 고정 표시만
  else if(filterVal==='Draft')  pagedSource = draftItems;
  else if(filterVal==='Finished') pagedSource = otherItems;
  else pagedSource = [...draftItems, ...otherItems];         // 전체: Draft + 나머지

  const total = pagedSource.length;
  const totalPages = Math.max(1, Math.ceil(total/EVT_PAGE_SIZE));
  if(_evtPage > totalPages) _evtPage = totalPages;
  const start = (_evtPage-1)*EVT_PAGE_SIZE;
  const pageData = pagedSource.slice(start, start+EVT_PAGE_SIZE);

  function renderItem(ev, pinned){
    const f = ev.fields;
    return `<div class="admin-event-item${pinned?' pinned':''}">
      <div class="admin-event-info">
        <div class="admin-event-title">${f.Title}</div>
        <div class="admin-event-meta">${fmtDT(f.AvailableStart)} ~ ${fmtDT(f.AvailableEnd)} | 마감: ${fmtDT(f.Deadline)} | 🎫 ${f.CouponCost||1}개${f.AutoActivateAt&&f.Status==='Draft'?` | ⏰ 자동활성화: ${fmtDT(f.AutoActivateAt)}`:''}</div>
      </div>
      <div class="admin-event-actions">
        <button class="btn btn-secondary btn-sm" onclick="editEvent(${ev.id})">✏️ 수정</button>
        ${f.Status==='Draft'?`<button class="btn btn-success btn-sm" onclick="changeEventStatus(${ev.id},'Active')">🟢 활성화</button>`:''}
        ${f.Status==='Active'?`<button class="btn btn-secondary btn-sm" onclick="changeEventStatus(${ev.id},'Draft')">⏸ 비활성화</button>`:''}
        ${f.Status!=='Finished'?`<button class="btn btn-danger btn-sm" onclick="changeEventStatus(${ev.id},'Finished')">⏹ 종료</button>`:''}
        <span class="status-badge ${f.Status==='Active'?'active':f.Status==='Finished'?'finished':'draft'}" style="margin-left:4px">${f.Status==='Active'?'진행 중':f.Status==='Finished'?'종료':'초안'}</span>
      </div>
    </div>`;
  }

  // ── 진행 중 고정 섹션
  let pinnedHtml = '';
  if(activeItems.length && (filterVal==='all'||filterVal==='Active')){
    pinnedHtml = `<div class="adm-section-label">🟢 진행 중 — ${activeItems.length}건</div>`
      + activeItems.map(ev=>renderItem(ev,true)).join('');
  }

  // ── 페이지네이션 섹션에서 Draft / 나머지 구분선 삽입
  let html = '';
  if(filterVal==='all'){
    const pageDraft  = pageData.filter(ev=>ev.fields.Status==='Draft');
    const pageOther  = pageData.filter(ev=>ev.fields.Status!=='Draft');
    if(pageDraft.length){
      html += `<hr class="adm-divider"><div class="adm-section-label">🟡 초안 — ${draftItems.length}건</div>`
            + pageDraft.map(ev=>renderItem(ev,false)).join('');
    }
    if(pageOther.length){
      html += `<hr class="adm-divider"><div class="adm-section-label">기타 이벤트</div>`
            + pageOther.map(ev=>renderItem(ev,false)).join('');
    }
  } else if(filterVal==='Draft'){
    html = `<hr class="adm-divider"><div class="adm-section-label">🟡 초안 — ${draftItems.length}건</div>`
         + pageData.map(ev=>renderItem(ev,false)).join('');
  } else {
    html = pageData.map(ev=>renderItem(ev,false)).join('');
  }

  const pager = totalPages > 1 ? `
    <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;font-size:.82rem">
      <button class="btn btn-secondary btn-sm" onclick="evtPageGo(1)" ${_evtPage===1?'disabled':''}>«</button>
      <button class="btn btn-secondary btn-sm" onclick="evtPageGo(${_evtPage-1})" ${_evtPage===1?'disabled':''}>‹</button>
      <span style="color:var(--text2)">${_evtPage} / ${totalPages}</span>
      <button class="btn btn-secondary btn-sm" onclick="evtPageGo(${_evtPage+1})" ${_evtPage===totalPages?'disabled':''}>›</button>
      <button class="btn btn-secondary btn-sm" onclick="evtPageGo(${totalPages})" ${_evtPage===totalPages?'disabled':''}>»</button>
    </div>` : '';

  const noItems = !pinnedHtml && !html;
  document.getElementById('admin-event-list').innerHTML =
    (noItems ? '<div style="color:var(--gray3);padding:12px">이벤트가 없습니다</div>'
              : pinnedHtml + html) + pager;
}

function evtPageGo(p){
  const totalPages = Math.max(1, Math.ceil(_evtData.length/EVT_PAGE_SIZE));
  _evtPage = Math.max(1, Math.min(totalPages, p));
  renderAdminEventList();
}

async function changeEventStatus(evId, status){
  const msg = status==='Active'?'활성화':status==='Finished'?'종료':'비활성화';
  showConfirmModal(`이벤트를 ${msg}하시겠습니까?`, async()=>{
    loading(true);
    try{
      await api(`/sites/${siteId}/lists/${LIST_EVENTS}/items/${evId}`,'PATCH',{fields:{Status:status}});
      await loadAdminEvents();
      await loadEvents();
    }catch(e){ alert('상태 변경 실패: '+e.message); }
    finally{ loading(false); }
  });
}

// ADMIN: DRAW SCHEDULE
// ═══════════════════════════════════════════
const DRAW_SCHEDULE_KEY = 'wmc_draw_schedule';
let _drawTimer = null;

function initDrawHourSelect(){
  const sel = document.getElementById('draw-hour-sel');
  if(!sel || sel.options.length > 0) return;
  for(let i=0;i<24;i++){
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = String(i).padStart(2,'0');
    if(i===18) opt.selected = true;
    sel.appendChild(opt);
  }
}

function saveDrawSchedule(){
  initDrawHourSelect();
  const day  = parseInt(document.getElementById('draw-day-sel').value);
  const hour = parseInt(document.getElementById('draw-hour-sel').value);
  const min  = parseInt(document.getElementById('draw-min-sel').value||'0');
  localStorage.setItem(DRAW_SCHEDULE_KEY, JSON.stringify({day, hour, min}));
  startDrawScheduler();
  showToast(`자동 추첨 저장 완료!`, '✅', 1800);
}

function loadDrawSchedule(){
  initDrawHourSelect();
  try{
    const s = JSON.parse(localStorage.getItem(DRAW_SCHEDULE_KEY)||'null');
    if(!s) return null;
    document.getElementById('draw-day-sel').value = s.day;
    document.getElementById('draw-hour-sel').value = s.hour;
    if(s.min!=null) document.getElementById('draw-min-sel').value = s.min;
    return s;
  }catch(e){ return null; }
}

async function checkAutoActivate(){
  try{
    if(!siteId) return;
    const nowUTC = new Date();
    const data = await api(`/sites/${siteId}/lists/${LIST_EVENTS}/items?$expand=fields&$top=100`);
    let activated = false;
    for(const ev of data.value){
      const f = ev.fields;
      if(f.Status==='Draft' && f.AutoActivateAt){
        const activateTime = new Date(f.AutoActivateAt);
        if(activateTime <= nowUTC){
          await api(`/sites/${siteId}/lists/${LIST_EVENTS}/items/${ev.id}`,'PATCH',{fields:{Status:'Active'}});
          console.log('[Auto-Activate] 활성화:', f.Title, '예정:', activateTime.toISOString(), '현재:', nowUTC.toISOString());
          activated = true;
        }
      }
    }
    if(activated) await loadEvents();
  }catch(e){ console.warn('자동 활성화 체크 실패:', e.message); }
}

function startDrawScheduler(){
  if(_drawTimer) clearInterval(_drawTimer);
  _drawTimer = setInterval(async()=>{
    // 자동 추첨 체크
    const s = JSON.parse(localStorage.getItem(DRAW_SCHEDULE_KEY)||'null');
    if(s){
      const now = new Date(new Date().getTime()+9*3600*1000);
      const sMin = s.min||0; if(now.getUTCDay()===s.day && now.getUTCHours()===s.hour && now.getUTCMinutes()===sMin){
        try{
          const data = await api(`/sites/${siteId}/lists/${LIST_EVENTS}/items?$expand=fields&$top=100`);
          const active = data.value.filter(ev=>ev.fields.Status==='Active');
          for(const ev of active) await runDrawForEvent(ev.id);
        }catch(e){ console.error('자동 추첨 실패:',e); }
      }
    }
    // 자동 활성화 체크
    await checkAutoActivate();
  }, 60000);
}

async function runDrawForEvent(evId){
  const [vehs, apps] = await Promise.all([
    api(`/sites/${siteId}/lists/${LIST_VEHICLES}/items?$expand=fields&$top=50`),
    api(`/sites/${siteId}/lists/${LIST_APPS}/items?$expand=fields&$top=500`)
  ]);
  const ev = await api(`/sites/${siteId}/lists/${LIST_EVENTS}/items/${evId}?$expand=fields`);
  const couponCost = ev.fields.CouponCost||1;
  let winnerCount = 0;
  for(const veh of vehs.value.filter(v=>Number(v.fields.EventID)===Number(evId))){
    const vApps = apps.value.filter(a=>Number(a.fields.EventID)===Number(evId)&&Number(a.fields.VehicleID)===Number(veh.id)&&a.fields.Status==='Applied');
    if(!vApps.length) continue;
    const winner = vApps[Math.floor(Math.random()*vApps.length)];
    await api(`/sites/${siteId}/lists/${LIST_APPS}/items/${winner.id}`,'PATCH',{fields:{Status:'Winner'}});
    for(const loser of vApps.filter(a=>a.id!==winner.id)){
      const lCoupon = couponData.find(c=>(c.email||'').toLowerCase()===(loser.fields.ApplicantEmail||'').toLowerCase());
      if(lCoupon) await updateCouponInExcel(lCoupon.email, lCoupon.coupon+couponCost);
      await api(`/sites/${siteId}/lists/${LIST_APPS}/items/${loser.id}`,'PATCH',{fields:{Status:'NotSelected'}});
    }
    winnerCount++;
  }
  // 추첨 완료 후 이벤트 상태를 Finished로 변경
  await api(`/sites/${siteId}/lists/${LIST_EVENTS}/items/${evId}`,'PATCH',{fields:{Status:'Finished'}});
  return winnerCount;
}

async function runDraw(){
  const evId = document.getElementById('draw-event-sel').value;
  if(!evId){ alert('이벤트를 선택해주세요.'); return; }
  showConfirmModal('선택한 이벤트의 당첨자를 추첨하시겠습니까? 이미 지원한 인원 중 차량당 1명이 무작위 선정됩니다.', async()=>{
    loading(true,'추첨 진행 중...');
    try{
      const winnerCount = await runDrawForEvent(evId);
      alert(`✅ 추첨 완료!\n총 ${winnerCount}명의 당첨자가 선정되었습니다.`);
      await loadAdminEvents();
    }catch(e){ alert('추첨 실패: '+e.message); }
    finally{ loading(false); }
  });
}

const COUPON_PAGE_SIZE = 10;
let _couponPage = 1;
let _couponFiltered = [];

async function loadCouponData(){
  loading(true,'쿠폰 데이터 로드 중...');
  try{
    await loadMyCoupons();
    _couponPage = 1;
    _couponFiltered = [...couponData];

function filterCoupon(){

function renderCouponTable(){

      oninput="filterCoupon()">
      <span id="coupon-count" style="font-size:.78rem;color:var(--text2);white-space:nowrap"></span>`;
    container.innerHTML = '';
    container.appendChild(searchBar);
    const tableWrap = document.createElement('div');
    tableWrap.id = 'coupon-table-body';
    container.appendChild(tableWrap);
  }

  document.getElementById('coupon-count').textContent = total+'명';

  if(!total){
    document.getElementById('coupon-table-body').innerHTML='<div style="color:var(--gray3);padding:12px">검색 결과가 없습니다.</div>';
    return;
  }

  document.getElementById('coupon-table-body').innerHTML = `
    <table style="width:100%;border-collapse:collapse;font-size:.83rem">
      <thead><tr style="background:var(--blue);color:#fff">
        <th style="padding:8px 12px;text-align:left">이름</th>
        <th style="padding:8px 12px;text-align:left">이메일</th>
        <th style="padding:8px 12px;text-align:center">쿠폰</th>
        <th style="padding:8px 12px;text-align:center">조정</th>
      </tr></thead>
      <tbody>${pageData.map(c=>`<tr style="border-bottom:1px solid var(--gray2)">
        <td style="padding:8px 12px">${c.name}</td>
        <td style="padding:8px 12px;color:var(--text2);font-size:.78rem">${c.email}</td>
        <td style="padding:8px 12px;text-align:center;font-weight:700" id="coupon-val-${btoa(c.email).replace(/=/g,'')}">${c.coupon}</td>
        <td style="padding:8px 12px;text-align:center">
          <div style="display:flex;gap:4px;justify-content:center;align-items:center">
            <button class="btn btn-danger btn-sm" onclick="stepCouponInput('${c.email}',-1)">−</button>
            <input type="number" id="coupon-inp-${btoa(c.email).replace(/=/g,'')}" value="${c.coupon}" min="0"
              style="width:52px;text-align:center;border:1px solid var(--gray2);border-radius:4px;padding:3px">
            <button class="btn btn-success btn-sm" onclick="stepCouponInput('${c.email}',1)">＋</button>
            <button title="적용" onclick="applyCoupon('${c.email}')"
              style="background:#0078d4;color:#fff;border:none;border-radius:6px;padding:4px 9px;cursor:pointer;font-size:.9rem;line-height:1" title="적용">✓</button>
          </div>
        </td>
      </tr>`).join('')}</tbody>
    </table>
    <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;font-size:.82rem">
      <button class="btn btn-secondary btn-sm" onclick="couponPageGo(1)" ${_couponPage===1?'disabled':''}>«</button>
      <button class="btn btn-secondary btn-sm" onclick="couponPageGo(${_couponPage-1})" ${_couponPage===1?'disabled':''}>‹</button>
      <span style="color:var(--text2)">${_couponPage} / ${totalPages}</span>
      <button class="btn btn-secondary btn-sm" onclick="couponPageGo(${_couponPage+1})" ${_couponPage===totalPages?'disabled':''}>›</button>
      <button class="btn btn-secondary btn-sm" onclick="couponPageGo(${totalPages})" ${_couponPage===totalPages?'disabled':''}>»</button>
    </div>`;
}

function couponPageGo(p){
  const totalPages = Math.max(1, Math.ceil(_couponFiltered.length/COUPON_PAGE_SIZE));
  _couponPage = Math.max(1, Math.min(totalPages, p));
  renderCouponTable();
}

function _couponKey(email){ return btoa(email).replace(/=/g,''); }

function stepCouponInput(email, delta){
  const inp = document.getElementById('coupon-inp-'+_couponKey(email));
  if(!inp) return;
  inp.value = Math.max(0, (parseInt(inp.value)||0) + delta);
}

async function applyCoupon(email){
  const inp = document.getElementById('coupon-inp-'+_couponKey(email));
  if(!inp) return;
  const newVal = Math.max(0, parseInt(inp.value)||0);
  loading(true, '쿠폰 저장 중...');
  try{
    await updateCouponInExcel(email, newVal);
    // couponData 로컬 업데이트
    const c = couponData.find(x=>x.email.toLowerCase()===email.toLowerCase());
    if(c) c.coupon = newVal;
    const f = _couponFiltered.find(x=>x.email.toLowerCase()===email.toLowerCase());
    if(f) f.coupon = newVal;
    // 표시값 업데이트 (테이블 전체 재렌더 없이)
    const valEl = document.getElementById('coupon-val-'+_couponKey(email));
    if(valEl) valEl.textContent = newVal;
    // 헤더 쿠폰 수 갱신
    const mine = couponData.find(c=>c.email.toLowerCase()===user.email.toLowerCase());
    if(mine) document.getElementById('coupon-header').textContent='🎫 쿠폰: '+mine.coupon+'개';
    loading(false);
    showToast('쿠폰 저장 완료!', '✅');
  }catch(e){
    loading(false);
    showToast('저장 실패: '+e.message, '❌', 3000);
  }
}

async function adjustCoupon(email, current, delta){
  const newVal = Math.max(0, current+delta);
  loading(true, '쿠폰 저장 중...');
  try{
    await updateCouponInExcel(email, newVal);
    await loadCouponData();
    loading(false);
    showToast('쿠폰 저장 완료!', '✅');
  }catch(e){
    loading(false);
    showToast('저장 실패: '+e.message, '❌', 3000);
    return;
  }
}
async function setCoupon(email, val){
  const newVal = Math.max(0, parseInt(val)||0);
  await updateCouponInExcel(email, newVal);
  await loadCouponData();
}

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
function showConfirmModal(msg, onOk){
  document.getElementById('confirm-msg').innerHTML = msg.replace(/\n/g,'<br>');
  document.getElementById('confirm-modal').classList.add('open');
  document.getElementById('confirm-ok-btn').onclick = ()=>{ closeConfirm(); onOk(); };
}
function closeConfirm(){ document.getElementById('confirm-modal').classList.remove('open'); }

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
initMSAL();
startDrawScheduler();
</script>
</body>
